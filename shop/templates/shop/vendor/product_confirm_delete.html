{% extends base_template|default:'shop/base.html' %}

{% block vendor_content %}
<div class="card shadow-sm border-0">
    <div class="card-body p-4 text-center">
        <i class="bi bi-exclamation-triangle text-danger display-4 mb-3"></i>
        <h3 class="card-title">Confirm Deletion</h3>
        <p class="text-muted">Are you sure you want to delete <strong>{{ product.name }}</strong>? This action cannot be
            undone.</p>

        <form method="post" class="mt-4">
            {% csrf_token %}
            <div class="d-flex justify-content-center gap-3">
                <a href="{% url 'shop:vendor_product_list' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                <button type="submit" class="btn btn-danger px-4">Delete Permanently</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
